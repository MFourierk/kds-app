version: "3.9"

# Services de développement local pour le backend KDS.
# Usage : docker compose up -d
# (Le backend Django lui-même tourne hors conteneur pendant le dev, via `python manage.py runserver`)

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: kds_db
      POSTGRES_USER: kds_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"  # 5432 déjà pris par un PostgreSQL natif installé sur cette machine
    volumes:
      - kds_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  kds_pg_data:
